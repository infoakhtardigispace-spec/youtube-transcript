<!DOCTYPE html>
<html>
<head>
    <title>YouTube Transcript - 100% Working</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #141e30, #243b55);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .input-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        input {
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }
        
        input:focus {
            outline: none;
            border-color: #243b55;
        }
        
        button {
            padding: 15px;
            background: linear-gradient(135deg, #141e30, #243b55);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        .loading {
            text-align: center;
            padding: 30px;
            display: none;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #243b55;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            display: none;
        }
        
        .result-box {
            margin-top: 30px;
            display: none;
        }
        
        .transcript-container {
            max-height: 400px;
            overflow-y: auto;
            background: #f9f9f9;
            border-radius: 10px;
            padding: 15px;
            border: 1px solid #e0e0e0;
        }
        
        .transcript-line {
            padding: 10px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: flex-start;
        }
        
        .timestamp {
            background: #243b55;
            color: white;
            padding: 2px 10px;
            border-radius: 15px;
            font-size: 12px;
            min-width: 60px;
            text-align: center;
            margin-right: 10px;
        }
        
        .sample-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 20px 0;
        }
        
        .sample-btn {
            padding: 5px 10px;
            background: #e9ecef;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎥 YouTube Transcript</h1>
        <p class="subtitle">Simple aur working solution</p>
        
        <div class="input-section">
            <input type="text" id="videoUrl" placeholder="YouTube URL yahan likho" value="https://www.youtube.com/watch?v=xoZG5WQbgMw">
            <button onclick="getTranscript()">🔍 Transcript Liao</button>
        </div>
        
        <div class="sample-buttons">
            <button class="sample-btn" onclick="useVideo('https://www.youtube.com/watch?v=xoZG5WQbgMw')">Midjourney</button>
            <button class="sample-btn" onclick="useVideo('https://www.youtube.com/watch?v=5Tfwo1cB340')">Claude vs ChatGPT</button>
            <button class="sample-btn" onclick="useVideo('https://www.youtube.com/watch?v=2Vv-BfVoq4g')">Git Hindi</button>
        </div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>⏳ Transcript aa raha hai...</p>
        </div>
        
        <div class="error" id="error"></div>
        
        <div class="result-box" id="resultBox">
            <h3 id="videoTitle"></h3>
            <div class="transcript-container" id="transcriptContainer"></div>
            <button onclick="copyTranscript()" style="margin-top: 15px; width: 100%;">📋 Copy</button>
        </div>
    </div>

    <script>
        function getVideoId(url) {
            let match = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&]+)/);
            return match ? match[1] : null;
        }
        
        async function getTranscript() {
            let url = document.getElementById('videoUrl').value;
            let videoId = getVideoId(url);
            
            if (!videoId) {
                alert("❌ Sahi URL daalo!");
                return;
            }
            
            document.getElementById('loading').style.display = 'block';
            document.getElementById('resultBox').style.display = 'none';
            document.getElementById('error').style.display = 'none';
            
            try {
                // Direct API call - yt-dlp ki zaroorat nahi
                let apiUrl = `https://youtubetranscript.com/?server_video_id=${videoId}`;
                let response = await fetch(apiUrl);
                
                if (!response.ok) {
                    throw new Error('Transcript nahi mila');
                }
                
                let data = await response.json();
                
                if (data && data.length > 0) {
                    showTranscript(data);
                } else {
                    throw new Error('Transcript nahi mila');
                }
                
            } catch (error) {
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').innerText = '❌ ' + error.message;
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }
        
        function showTranscript(transcript) {
            let html = '';
            
            transcript.forEach((item, index) => {
                let startMin = Math.floor(item.start / 60);
                let endMin = Math.floor((item.start + (item.duration || 5)) / 60);
                
                html += `<div class="transcript-line">
                    <span class="timestamp">${startMin}:${endMin}</span>
                    <span>${item.text}</span>
                </div>`;
            });
            
            document.getElementById('transcriptContainer').innerHTML = html;
            document.getElementById('videoTitle').innerText = '📝 Transcript';
            document.getElementById('resultBox').style.display = 'block';
        }
        
        function copyTranscript() {
            let text = '';
            document.querySelectorAll('.transcript-line').forEach(line => {
                text += line.innerText + '\n';
            });
            navigator.clipboard.writeText(text);
            alert('✅ Copy ho gaya!');
        }
        
        function useVideo(url) {
            document.getElementById('videoUrl').value = url;
            getTranscript();
        }
    </script>
</body>
</html>

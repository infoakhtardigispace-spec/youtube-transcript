<!DOCTYPE html>
<html>
<head>
    <title>YouTube Transcript</title>
</head>
<body>
    <h1>YouTube Transcript Extractor</h1>
    <input type="text" id="url" placeholder="YouTube URL daalo">
    <button onclick="getTranscript()">Submit</button>
    <div id="result"></div>

    <script>
        async function getTranscript() {
            let url = document.getElementById('url').value;
            let videoId = extractId(url);
            
            if (!videoId) {
                alert("Sahi URL daalo!");
                return;
            }
            
            let response = await fetch(`https://youtubetranscript.com/?server_video_id=${videoId}`);
            let data = await response.json();
            
            let html = "";
            data.forEach(item => {
                let min = Math.floor(item.start / 60);
                html += `<p><strong>${min}:${min+1}</strong> ${item.text}</p>`;
            });
            
            document.getElementById('result').innerHTML = html;
        }
        
        function extractId(url) {
            let match = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&]+)/);
            return match ? match[1] : null;
        }
    </script>
</body>
</html>

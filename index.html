<!DOCTYPE html>
<html>
<head>
    <title>YouTube Transcript - Full Working</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #141e30, #243b55);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #141e30;
            margin-bottom: 10px;
            font-size: 2em;
            text-align: center;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            text-align: center;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }
        input:focus {
            outline: none;
            border-color: #243b55;
        }
        button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #141e30, #243b55);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .loading {
            text-align: center;
            padding: 30px;
            display: none;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #243b55;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error {
            background: #ffebee;
            color: #c62828;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            border: 1px solid #ffcdd2;
            display: none;
        }
        .success {
            background: #e8f5e8;
            color: #2e7d32;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            display: none;
        }
        .transcript-box {
            margin-top: 30px;
            display: none;
        }
        .video-info {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .transcript-content {
            max-height: 500px;
            overflow-y: auto;
            background: #f9f9f9;
            border-radius: 10px;
            padding: 15px;
            border: 1px solid #e0e0e0;
        }
        .line {
            padding: 10px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: flex-start;
        }
        .line:hover {
            background: #f0f0f0;
        }
        .timestamp {
            background: #243b55;
            color: white;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            min-width: 60px;
            text-align: center;
            margin-right: 15px;
        }
        .copy-btn {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            background: linear-gradient(135deg, #34a853, #0f9d58);
        }
        .sample-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 20px 0;
            justify-content: center;
        }
        .sample-btn {
            padding: 8px 15px;
            background: #e9ecef;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
        }
        .sample-btn:hover {
            background: #dee2e6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎥 YouTube Transcript Pro</h1>
        <p class="subtitle">Backend proxy ke saath - Har video ka transcript!</p>
        
        <div class="input-group">
            <input type="text" id="videoUrl" placeholder="YouTube URL yahan likho" value="https://www.youtube.com/watch?v=xoZG5WQbgMw">
            <button onclick="getTranscript()">🔍 Search</button>
        </div>
        
        <div class="sample-buttons">
            <button class="sample-btn" onclick="useVideo('https://www.youtube.com/watch?v=xoZG5WQbgMw')">🎨 Midjourney</button>
            <button class="sample-btn" onclick="useVideo('https://www.youtube.com/watch?v=5Tfwo1cB340')">🤖 Claude vs ChatGPT</button>
            <button class="sample-btn" onclick="useVideo('https://www.youtube.com/watch?v=2Vv-BfVoq4g')">📺 Git Hindi</button>
        </div>
        
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>⏳ Transcript la rahe hain...</p>
        </div>
        
        <div id="error" class="error"></div>
        <div id="success" class="success"></div>
        
        <div id="transcriptBox" class="transcript-box">
            <div class="video-info">
                <h3 id="videoTitle">Video Title</h3>
                <p id="videoStats"></p>
            </div>
            <div id="transcriptContent" class="transcript-content"></div>
            <button onclick="copyTranscript()" class="copy-btn">📋 Copy Transcript</button>
        </div>
    </div>

    <script>
        // 🔥 COMPLETE SCRIPT - DIRECTLY COPY PASTE KARO 🔥
        
        // YouTube URL se video ID nikaalne ka function
        function getVideoId(url) {
            try {
                let patterns = [
                    /(?:youtube\.com\/watch\?v=)([^&]+)/i,
                    /(?:youtu\.be\/)([^?]+)/i,
                    /(?:youtube\.com\/embed\/)([^?]+)/i,
                    /(?:youtube\.com\/shorts\/)([^?]+)/i
                ];
                
                for (let pattern of patterns) {
                    let match = url.match(pattern);
                    if (match) return match[1];
                }
                
                // Agar sirf video ID ho (11 characters)
                if (url.length === 11 && /^[a-zA-Z0-9_-]{11}$/.test(url)) {
                    return url;
                }
                
                return null;
            } catch (e) {
                return null;
            }
        }
        
        // MAIN FUNCTION: Transcript lene ka
        async function getTranscript() {
            let url = document.getElementById('videoUrl').value;
            let videoId = getVideoId(url);

            if (!videoId) {
                alert("❌ Sahi YouTube URL daalo!\nExample: https://www.youtube.com/watch?v=xxxx");
                return;
            }

            // Loading dikhao
            document.getElementById('loading').style.display = 'block';
            document.getElementById('transcriptBox').style.display = 'none';
            document.getElementById('error').style.display = 'none';
            document.getElementById('success').style.display = 'none';

            try {
                // 🔥 DIRECT API CALL - YOUTUBE TRANSCRIPT API
               let apiUrl = `/api/transcript?videoId=${videoId}`;
                
                let response = await fetch(apiUrl);
                
                if (!response.ok) {
                    throw new Error('API response error');
                }

                let transcript = await response.json();
                
                if (transcript && transcript.length > 0) {
                    showTranscript(transcript, videoId);
                    document.getElementById('success').style.display = 'block';
                    document.getElementById('success').innerText = '✅ Transcript mil gaya!';
                } else {
                    throw new Error('Transcript nahi mila');
                }

            } catch (error) {
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').innerHTML = `
                    ❌ ${error.message}<br><br>
                    <strong>💡 Yeh videos try karo:</strong><br>
                    • https://www.youtube.com/watch?v=2Vv-BfVoq4g (Git Hindi)<br>
                    • https://www.youtube.com/watch?v=rfscVS0vtbw (Python)<br>
                    • https://www.youtube.com/watch?v=dQw4w9WgXcQ (Music)
                `;
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }
        
        // Transcript ko show karne ka function
        function showTranscript(transcript, videoId) {
            let html = '';
            
            for(let i = 0; i < transcript.length; i++) {
                let item = transcript[i];
                
                // Start time
                let start = item.start || 0;
                let startMin = Math.floor(start / 60);
                
                // End time
                let end;
                if (i < transcript.length - 1) {
                    end = transcript[i + 1].start || (start + 5);
                } else {
                    end = start + (item.duration || 5);
                }
                let endMin = Math.floor(end / 60);
                
                // Text
                let text = item.text || '';
                
                html += `<div class="line">
                    <span class="timestamp">${startMin}:${endMin}</span>
                    <span>${text}</span>
                </div>`;
            }
            
            document.getElementById('transcriptContent').innerHTML = html;
            document.getElementById('videoTitle').innerText = `Video ID: ${videoId}`;
            document.getElementById('videoStats').innerText = `📊 Total lines: ${transcript.length}`;
            document.getElementById('transcriptBox').style.display = 'block';
        }
        
        // Copy button ka function
        function copyTranscript() {
            let text = '';
            let lines = document.querySelectorAll('.line');
            
            for(let line of lines) {
                text += line.innerText + '\n';
            }
            
            navigator.clipboard.writeText(text).then(() => {
                alert('✅ Copy ho gaya!');
            }).catch(() => {
                alert('Manual copy karo');
            });
        }
        
        // Sample videos use karne ka function
        function useVideo(url) {
            document.getElementById('videoUrl').value = url;
            getTranscript();
        }
    </script>
</body>
</html>
